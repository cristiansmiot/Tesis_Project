# =============================================================================
# mosquitto.conf — Broker MQTT para Medidor Inteligente NTC 6079
# Proyecto: Tesis Maestría IoT - Universidad Javeriana
# Despliegue: Railway (servicio Mosquitto independiente)
# =============================================================================

# ── Listeners ─────────────────────────────────────────────────────────────────
# IMPORTANTE: el proxy TCP de Railway es passthrough crudo — NO termina TLS.
# Para que el enlace nodo→broker sea cifrado de extremo a extremo, el TLS
# debe servirlo el propio Mosquitto. Los certificados se generan con
# certs/generar_certificados.sh (CA propia, SAN = host del proxy Railway)
# y se suben al volumen del servicio; ver TLS_DEPLOY.md.

# Listener plano (transicion). Mantenerlo mientras los nodos en campo migran
# a TLS; una vez todos conectan por 8883, comentar este bloque y apuntar el
# proxy de Railway al 8883.
listener 1883
protocol mqtt

# Listener TLS (definitivo). Requiere los certificados en el volumen.
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
tls_version tlsv1.2
# Solo autenticacion de servidor: los clientes validan el broker con la CA
# y se autentican con usuario/contraseña (no se exige certificado cliente).
require_certificate false

# ── Autenticación ─────────────────────────────────────────────────────────────
# Requiere usuario y contraseña para toda conexion.
# El archivo passwd se genera con: mosquitto_passwd -b passwd medidor_iot <clave>
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Control de acceso por topic (ACL) ────────────────────────────────────────
# Define qué usuarios pueden publicar y suscribirse a qué topics.
# Referencia: https://mosquitto.org/man/mosquitto-conf-5.html
acl_file /mosquitto/config/acl

# ── Persistencia de sesion y mensajes retained ────────────────────────────────
# Permite que los mensajes con retain=1 (ej: /estado, /conexion) sobrevivan
# a un reinicio del broker. Critico para el LWT y el ultimo estado del nodo.
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# ── Retained messages ─────────────────────────────────────────────────────────
# Los topics /estado y /conexion usan retain=1 configurado desde el cliente.
# El broker almacena el ultimo mensaje de cada topic con retain=1 y lo entrega
# a nuevos suscriptores inmediatamente al conectarse.

# ── Sesiones persistentes ─────────────────────────────────────────────────────
# El SIM7080G usa CLEANSS=1 (clean session), lo que es correcto para un
# dispositivo que no necesita recibir mensajes perdidos durante offline.
# El backend usa clean_session=False para garantizar entrega de /estado offline.

# ── Keepalive y timeouts ──────────────────────────────────────────────────────
# El firmware configura keepalive=60s. El broker desconecta si no recibe
# PINGREQ en 1.5x el keepalive negociado (= 90s).
# max_keepalive impone un limite superior al keepalive que el cliente solicita.
max_keepalive 120

# ── Logging ───────────────────────────────────────────────────────────────────
# Niveles: error, warning, notice, information, debug, subscribe, unsubscribe
# En produccion usar error + warning + notice. Activar information para debug.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Limites de conexion ───────────────────────────────────────────────────────
# max_connections: limite de clientes simultaneos.
# -1 = sin limite. Para un prototipo de grado, 10 es mas que suficiente.
max_connections 10

# ── QoS y buffer de mensajes ─────────────────────────────────────────────────
# max_queued_messages: mensajes en cola por cliente con sesion persistente.
max_queued_messages 100
